name: Change proposal / idea
description: Propose a change or improvement to CHAOS (describe the problem before the solution)
title: "[Proposal]: "
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to propose a change or improvement to the **CHAOS tooling itself**. This is a
        normal GitHub issue for discussion — **not** a CHAOS lifecycle proposal (you don't run
        chaos:propose on this repo; see CONTRIBUTING.md).

        Please **describe the problem before the solution**, search existing issues and the
        roadmap (.chaos/roadmap/roadmap.md) for duplicates, and keep the report sanitized —
        no secrets or private/personal data.
  - type: textarea
    id: problem
    attributes:
      label: The problem / motivation
      description: What's missing, confusing, or painful? Why does it matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change or desired outcome
      description: What would you like to see? An outcome is fine if you don't have a specific design.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you set them aside.
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - Command / skill behaviour
        - GitHub Copilot adapter
        - Documentation
        - Interaction runtime / Decision Center
        - Hooks
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - Claude Code (.claude/)
        - GitHub Copilot (.github/)
        - Both
        - Not surface-specific / N/A
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, or anything else that helps.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and the roadmap for duplicates.
          required: true
        - label: This proposal contains no secrets, tokens, or private/personal data.
          required: true
